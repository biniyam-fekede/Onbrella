name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install dependencies
        run: npm ci || npm install

      - name: Install hardware mock dependencies
        run: cd hardwareSimulation && npm ci || npm install

      - name: Start hardware mock
        run: |
          cd hardwareSimulation && npm start &
          sleep 5
          curl -s -o /dev/null -w "%{http_code}" -X POST -H "Content-Type: application/json" -d '{"stationId":"test","slotNumber":1}' http://localhost:3000/hardware/unlock | grep -q 200 || (echo "Mock failed to start" && exit 1)

      - name: Run backend tests with coverage
        run: npm run test:coverage

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

      - name: Run hardware simulation tests with coverage
        run: npm run test:hardware:coverage

      - name: Upload hardware simulation coverage report
        uses: actions/upload-artifact@v4
        with:
          name: hardware-coverage
          path: hardwareSimulation/coverage
