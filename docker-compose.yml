services:
  hardware:
    build:
      context: ./hardwareSimulation
    ports:
      - "3000:3000"
    volumes:
      - ./hardwareSimulation:/app
      - /app/node_modules

  backend:
    build:
      context: ./backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      HARDWARE_URL: http://hardware:3000
    depends_on:
      - hardware
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules